name: JS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:

concurrency:
  group: '${{ github.workflow }} @ ${{ github.event.pull_request.head.label || github.head_ref || github.ref }}'
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Gate jobs - must pass before other jobs run
  syncpack:
    name: Sync Package Versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npx syncpack lint

  verify-deps:
    name: Verify Package Dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm install --prefix tools/verify-package-deps
      - run: npm run verify-deps

  format:
    name: Oxfmt
    runs-on: ubuntu-latest
    needs: [syncpack, verify-deps]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: rocicorp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npx oxfmt --check

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: [syncpack, verify-deps]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: rocicorp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - run: npm run lint

  check-types:
    name: Check Types
    runs-on: ubuntu-latest
    needs: [syncpack, verify-deps]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: rocicorp
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - run: npm run check-types

  test:
    name: Test (Shard ${{ matrix.shard }}/3)
    runs-on: ubuntu-latest
    needs: [format, lint, check-types]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: rocicorp
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - uses: ./.github/actions/playwright-install
      - name: Run tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: TEST_PG_MODE=nopg npm run test -- --shard=${{ matrix.shard }}/3

  test-pg:
    name: Test PG ${{ matrix.pg-version }} (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    needs: [format, lint, check-types]
    strategy:
      fail-fast: false
      matrix:
        pg-version: [18, 17, 16, 15]
        shard: [1, 2]
    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: rocicorp
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 100
      - uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: 'npm'
      - run: npm ci
      - name: Run tests
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: TEST_PG_MODE=pg-${{ matrix.pg-version }} npm run test -- --shard=${{ matrix.shard }}/2
